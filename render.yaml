previews:
  generation: automatic
  expireAfterDays: 2

projects:
  - name: davidhartingdotcom
    environments:
      - name: prod
        databases:
          - name: davidhartingdotcom-db
            databaseName: laravel
            user: laravel
            plan: basic-256mb
            previewPlan: basic-256mb
            postgresMajorVersion: "17"
            region: ohio
            diskSizeGB: 1
            storageAutoscalingEnabled: true

        envVarGroups:
          - name: davidhartingdotcom-shared
            envVars:
              # ---- Non-secret runtime config ----
              - key: APP_NAME
                value: davidharting.com
              - key: APP_ENV
                value: production
              - key: APP_DEBUG
                value: "false"
              # Canonical production URL; keep this aligned with the custom domain below.
              # Render auto-injects RENDER_EXTERNAL_URL per-service, so PR previews
              # get their actual onrender.com URL rather than the production domain.
              - key: APP_URL
                value: https://davidharting.com
                previewValue: ${RENDER_EXTERNAL_URL}

              - key: LOG_CHANNEL
                value: stderr-json
              - key: LOG_LEVEL
                value: info

              - key: CACHE_DRIVER
                value: database
              - key: SESSION_DRIVER
                value: database
              - key: SESSION_LIFETIME
                value: "120"
              - key: SESSION_SECURE_COOKIE
                value: "true"
              - key: QUEUE_CONNECTION
                value: database
              - key: BROADCAST_DRIVER
                value: log

              - key: DB_CONNECTION
                value: pgsql

              - key: FILESYSTEM_DISK_PRIVATE
                value: r2-private
              - key: FILESYSTEM_DISK_PUBLIC
                value: r2-public
              - key: R2_PUBLIC_BUCKET
                value: davidhartingdotcom-public
                previewValue: staging-davidhartingdotcom-public
              - key: R2_PUBLIC_URL
                value: https://cdn.davidharting.com
                previewValue: https://staging.cdn.davidharting.com

              - key: MAIL_MAILER
                value: mailersend
              - key: MAIL_FROM_ADDRESS
                value: hello@davidharting.com
              - key: MAIL_FROM_NAME
                value: davidharting.com

              - key: OCTANE_SERVER
                value: frankenphp
              - key: OCTANE_HTTPS
                value: "false"

              # Secrets are mounted as a Render secret file and linked to /app/.env
              # by scripts/render-with-secrets.sh at runtime. Production uses
              # secrets.env; preview environments use staging.secrets.env, served
              # from a manually-managed dashboard env group (not Blueprint-managed)
              # so it is shared across all preview services rather than being
              # copied per-PR (which would strip the secret file).
              - key: RENDER_SECRETS_ENV_FILE
                value: /etc/secrets/secrets.env
                previewValue: /etc/secrets/staging.secrets.env
              - key: RUN_DEV_SEEDER
                value: "false"
                previewValue: "true"

        services:
          - name: davidhartingdotcom-web
            type: web
            runtime: docker
            plan: starter
            previews:
              plan: starter
            initialDeployHook: bash /app/scripts/render-with-secrets.sh bash /app/scripts/seed.sh
            region: ohio
            dockerfilePath: ./Dockerfile
            autoDeployTrigger: checksPass
            healthCheckPath: /healthz
            domains:
              - davidharting.com
            # --caddyfile=Caddyfile is kept because without it Octane generates its own
            # stub Caddyfile and we lose the FrankenPHP worker config, body-size limit,
            # encode, and log redaction. $PORT is substituted inside the Caddyfile via
            # Caddy's native env syntax (:{$PORT:80}).
            #
            # --log-level is REQUIRED for structured logs, and the option does two
            # separate jobs in StartFrankenPhpCommand:
            #
            #   1. Output handling (line ~308): if --log-level is set to ANY value,
            #      Octane passes the FrankenPHP subprocess's stderr through raw. If it
            #      is omitted, Octane re-renders every line through Laravel's pretty
            #      console components, which destroys our JSON -- a Monolog line uses
            #      the "message" key but Octane reads "msg", so it falls back to the
            #      literal "unknown error" and prints "  ERROR  unknown error". So it
            #      is the PRESENCE of the flag, not its value, that fixes the format.
            #
            #   2. Verbosity (line ~102): the value becomes CADDY_SERVER_LOG_LEVEL.
            #      INFO makes Caddy emit access logs (full URI with the Caddyfile's
            #      authorization redaction, headers, upstream timing). These are
            #      additive to Render's own edge access logs but carry more detail.
            #
            # INFO therefore gives us JSON-formatted Caddy access logs.
            dockerCommand: bash /app/scripts/render-with-secrets.sh php artisan octane:frankenphp --caddyfile=Caddyfile --host=0.0.0.0 --port=$PORT --log-level=INFO
            # Migrations run once per deploy before the new version takes traffic. If
            # any command fails, Render cancels the deploy with zero downtime.
            # Telegram webhook registration is idempotent (setWebhook / setMyCommands
            # are upserts on Telegram's side).
            preDeployCommand: bash /app/scripts/render-with-secrets.sh bash /app/scripts/predeploy.sh
            envVars:
              - fromGroup: davidhartingdotcom-shared
              - fromGroup: davidhartingdotcom-preview-env-secrets
              - key: DATABASE_URL
                fromDatabase:
                  name: davidhartingdotcom-db
                  property: connectionString

          - name: davidhartingdotcom-worker
            type: worker
            runtime: docker
            plan: starter
            previews:
              plan: starter
            region: ohio
            dockerfilePath: ./Dockerfile
            autoDeployTrigger: checksPass
            # --tries=3 --backoff=30 makes the worker resilient to the ~60s window
            # where it might boot new code against the old DB schema (preDeploy runs
            # only on the web service; worker has its own independent pipeline).
            dockerCommand: bash /app/scripts/render-with-secrets.sh php artisan queue:work -v --tries=3 --backoff=30
            envVars:
              - fromGroup: davidhartingdotcom-shared
              - fromGroup: davidhartingdotcom-preview-env-secrets
              - key: DATABASE_URL
                fromDatabase:
                  name: davidhartingdotcom-db
                  property: connectionString

          - name: davidhartingdotcom-backup-run
            type: cron
            runtime: docker
            plan: starter
            previews:
              generation: off
            region: ohio
            dockerfilePath: ./Dockerfile
            autoDeployTrigger: checksPass
            # Run a database-only backup at the top of every hour.
            schedule: "0 * * * *"
            dockerCommand: bash /app/scripts/render-with-secrets.sh php artisan backup:run --only-db
            envVars:
              - fromGroup: davidhartingdotcom-shared
              - fromGroup: davidhartingdotcom-preview-env-secrets
              - key: DATABASE_URL
                fromDatabase:
                  name: davidhartingdotcom-db
                  property: connectionString

          - name: davidhartingdotcom-backup-clean
            type: cron
            runtime: docker
            plan: starter
            previews:
              generation: off
            region: ohio
            dockerfilePath: ./Dockerfile
            autoDeployTrigger: checksPass
            # Prune old backups once per day at midnight UTC.
            schedule: "0 0 * * *"
            dockerCommand: bash /app/scripts/render-with-secrets.sh php artisan backup:clean
            envVars:
              - fromGroup: davidhartingdotcom-shared
              - fromGroup: davidhartingdotcom-preview-env-secrets
              - key: DATABASE_URL
                fromDatabase:
                  name: davidhartingdotcom-db
                  property: connectionString
